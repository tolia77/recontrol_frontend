name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint code with ESLint
        run: npm run lint

      - name: Build frontend bundle
        run: npm run build

      - name: Scan bundle for leaked secrets
        run: |
          if grep -rE 'LIQPAY_PRIVATE|sandbox_' dist/; then
            echo "secret leak detected in dist/"
            exit 1
          fi

      - name: Run vitest test suite
        run: npx vitest run
